name: Deploy to Ubuntu Server

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH connection
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          sudo apt-get update && sudo apt-get install -y sshpass

      - name: Deploy to server
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} -p ${{ secrets.SSH_PORT }} << 'EOF'
          set -e
          
          DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
          
          # Configure git globally for deployment user
          git config --global user.email "deploy@github.com"
          git config --global user.name "GitHub Deploy"
          
          # Create deploy directory if it doesn't exist
          if [ ! -d "$DEPLOY_PATH" ]; then
            echo "Creating deployment directory: $DEPLOY_PATH"
            mkdir -p "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"
            git init
            git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            git fetch origin
            git checkout ${{ github.ref_name }}
          else
            cd "$DEPLOY_PATH"
            # Update remote URL in case it changed
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          fi
          
          # Backup uploaded files before git pull
          echo "Backing up uploaded files..."
          BACKUP_DIR="/tmp/uploads_backup_$(date +%s)"
          mkdir -p "$BACKUP_DIR"
          if [ -d "public/uploads" ]; then
            cp -r public/uploads/* "$BACKUP_DIR/" 2>/dev/null || true
          fi
          
          # Pull latest code
          git fetch origin
          git checkout ${{ github.ref_name }}
          git pull origin ${{ github.ref_name }}
          
          # Restore uploaded files
          echo "Restoring uploaded files..."
          mkdir -p public/uploads/products
          mkdir -p public/uploads/categories
          mkdir -p public/uploads/sub_categories
          mkdir -p public/uploads/brands
          
          if [ -d "$BACKUP_DIR" ]; then
            cp -r "$BACKUP_DIR"/* public/uploads/ 2>/dev/null || true
            rm -rf "$BACKUP_DIR"
          fi
          
          # Install dependencies
          composer install --no-dev --optimize-autoloader
          npm ci
          npm run build
          
          # Generate optimized .env.prod.php for production
          composer dump-env prod
          
          # Clear cache
          php bin/console cache:clear --env=prod
          
          # Run migrations if needed
          php bin/console doctrine:migrations:migrate --no-interaction --env=prod
          
          # Fix permissions
          chmod -R 755 public/
          chmod -R 777 var/
          chmod -R 777 public/uploads/
          
          echo "Deployment completed successfully!"
          EOF
